<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <!-- Titre principal (50-60 chars idéal) -->
  <title>GBUSS – Mouvement Étudiant Chrétien au Sénégal</title>

  <!-- Description (150-160 chars) -->

  <!-- Canonical -->
  <link rel="canonical" href="https://gbuss.netlify.app/" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->

  <meta property="og:locale" content="fr_SN" />

  <meta property="og:url" content="https://gbuss.netlify.app/" />

  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="GBUSS – Groupe Biblique Universitaire et Scolaire du Sénégal" />

  <meta name="twitter:image" content="https://gbuss.netlify.app/og-image.png" />

        "name": "Sénégal"
      },
      "address": {
