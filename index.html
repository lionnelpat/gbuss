<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Titre principal -->
  <title>GBUSS – Groupe Biblique Universitaire et Scolaire du Sénégal</title>

  <!-- Description (150-160 caractères idéal) -->
  <meta name="description" content="GBUSS est un mouvement étudiant chrétien au Sénégal. Des étudiants formés en disciples, transformés par l'Évangile, avec un impact sur l'université, l'église et la société.">

  <!-- Mots-clés (faible impact aujourd'hui mais utile pour Bing) -->
  <meta name="keywords" content="GBUSS, mouvement chrétien étudiant, Sénégal, bible, université, disciples, Dakar, Ziguinchor">

  <!-- Auteur et robots -->
  <meta name="author" content="GBUSS – Groupe Biblique Universitaire et Scolaire du Sénégal">
  <meta name="robots" content="index, follow">

  <!-- Langue -->
  <link rel="alternate" hreflang="fr" href="https://gbu-senegal.org/" />

  <!-- Canonical (évite le contenu dupliqué) -->
  <link rel="canonical" href="https://gbu-senegal.org/" />

  <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MyWebSite" />
  <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_SN" />
  <meta property="og:site_name" content="GBUSS" />
  <meta property="og:url" content="https://gbuss.org/" />
  <meta property="og:title" content="GBUSS – Mouvement Étudiant Chrétien au Sénégal" />
  <meta property="og:description" content="Des étudiants qui croissent ensemble en tant que communautés de disciples, transformés par l'Évangile et ayant un impact sur l'université, l'église et la société pour la gloire de Christ." />
  <!-- Image OG : doit être une URL absolue (pas /src/assets/...) -->
  <meta property="og:image" content="https://gbuss.org/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Logo GBUSS – Groupe Biblique Universitaire et Scolaire du Sénégal" />

  <!-- Twitter / X Cards -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@gbuss_senegal" />
  <meta name="twitter:title" content="GBUSS – Mouvement Étudiant Chrétien au Sénégal" />
  <meta name="twitter:description" content="Des étudiants qui croissent ensemble en tant que communautés de disciples, transformés par l'Évangile." />
  <meta name="twitter:image" content="https://gbuss.org/og-image.png" />

  <!-- Données structurées JSON-LD (très important pour Google) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GBUSS",
      "alternateName": "Groupe Biblique Universitaire et Scolaire du Sénégal",
      "url": "https://gbuss.org",
      "logo": "https://gbuss.org/logo-gbuss.png",
      "description": "Mouvement étudiant chrétien au Sénégal, formant des disciples transformés par l'Évangile.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "SN",
        "addressLocality": "Dakar"
      },
      "sameAs": [
        "https://facebook.com/gbuss",
        "https://instagram.com/gbuss"
      ]
    }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>

<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
